name: AI Guard Protection

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  ai-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Count changed files
        id: changes
        run: |
          COUNT=$(git diff --name-only origin/main...HEAD | wc -l)
          echo "changed_files=$COUNT" >> $GITHUB_OUTPUT

      - name: Block large changes
        if: steps.changes.outputs.changed_files > 15
        run: |
          echo "❌ Too many files modified by AI"
          echo "Security protection activated"
          exit 1
